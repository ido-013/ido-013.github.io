<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>포트폴리오</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            background-color: #f4f4f9;
            color: #333;
        }

        header {
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            color: white;
            padding: 4rem 0;
            text-align: center;
            position: relative;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: -50px;
            left: 0;
            right: 0;
            height: 50px;
            background: white;
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 0;
        }

        .intro {
            text-align: center;
            margin-bottom: 3rem;
        }

        .intro h1 {
            margin-bottom: 0.5rem;
            font-size: 2.5rem;
        }

        .intro p {
            font-size: 1.2rem;
            margin-top: 0.5rem;
            color: #555;
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            position: relative;
        }

        .section-title::after {
            content: '';
            width: 60px;
            height: 4px;
            background: #a777e3;
            display: block;
            margin: 0.5rem auto 0;
        }

        .projects, .skills, .contact {
            margin-bottom: 4rem;
        }

        .project, .skill {
            background: white;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            transition: transform 0.3s ease-in-out;
        }

        .project:hover, .skill:hover {
            transform: translateY(-10px);
        }

        .project img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .project h3, .skill h3 {
            margin-top: 0;
            color: #333;
        }

        .contact form {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .contact form input, .contact form textarea {
            width: 100%;
            max-width: 600px;
            margin-bottom: 1rem;
            padding: 0.75rem;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1rem;
        }

        .contact form button {
            padding: 0.75rem 2rem;
            border: none;
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            color: white;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s ease-in-out;
        }

        .contact form button:hover {
            background: linear-gradient(135deg, #a777e3, #6e8efb);
        }

        footer {
            text-align: center;
            padding: 2rem 0;
            background: #333;
            color: white;
        }

        .fade-up {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
        }

        .fade-up.in-view {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <header>
        <h1>나의 포트폴리오</h1>
    </header>
    <div class="container">
        <section class="intro fade-up">
            <h1>안녕하세요, 저는 [당신의 이름]입니다.</h1>
            <p>저는 [직업/전문 분야]입니다. 여기에 저의 작업과 프로젝트를 소개합니다.</p>
        </section>

        <section class="projects">
            <h2 class="section-title fade-up">프로젝트</h2>
            <div class="row">
                <div class="col-md-6 fade-up">
                    <div class="project">
                        <h3>프로젝트 1</h3>
                        <img src="project1.jpg" alt="프로젝트 1 이미지">
                        <p>프로젝트 1 설명...</p>
                    </div>
                </div>
                <div class="col-md-6 fade-up">
                    <div class="project">
                        <h3>프로젝트 2</h3>
                        <img src="project2.jpg" alt="프로젝트 2 이미지">
                        <p>프로젝트 2 설명...</p>
                    </div>
                </div>
                <!-- 추가 프로젝트를 여기에 추가 -->
            </div>
        </section>

        <section class="skills">
            <h2 class="section-title fade-up">기술</h2>
            <div class="row">
                <div class="col-md-6 fade-up">
                    <div class="skill">
                        <h3>기술 1</h3>
                        <p>기술 1 설명...</p>
                    </div>
                </div>
                <div class="col-md-6 fade-up">
                    <div class="skill">
                        <h3>기술 2</h3>
                        <p>기술 2 설명...</p>
                    </div>
                </div>
                <!-- 추가 기술을 여기에 추가 -->
            </div>
        </section>

        <section class="contact">
            <h2 class="section-title fade-up">연락처</h2>
            <form action="submit_form.php" method="POST">
                <input type="text" name="name" placeholder="이름" required class="fade-up">
                <input type="email" name="email" placeholder="이메일" required class="fade-up">
                <textarea name="message" rows="5" placeholder="메시지" required class="fade-up"></textarea>
                <button type="submit" class="fade-up">보내기</button>
            </form>
        </section>
    </div>
    <footer>
        <p>&copy; 2024 나의 포트폴리오. 모든 권리 보유.</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const observer = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('in-view');
                    }
                });
            });

            document.querySelectorAll('.fade-up').forEach(element => {
                observer.observe(element);
            });
        });
    </script>
</body>
</html>
